# File synced from https://github.com/FasterSpeeding/Aurora-Fauxy
# Changes will not be persisted
[tools]
# Languages
go = "1.26.1"
python = "3"
rust = { version = "1.94.0", components = "rustc,cargo" }
# CLI tools
cargo-binstall = "1.15.6"
"go:github.com/schollz/croc/v10" = "v10.4.1"
flux2 = "2.8.1"
git-lfs = "3.7.0"
helm = "4.0.5"
uv = "0.10.9"
just = "1.46.0"
kubeseal = "0.32.2"
minikube = "1.38.1"
opentofu = "1.11.3"
"pipx:yt-dlp" = "2026.3.3"

[settings]
activate_aggressive = true
experimental = true
gpg_verify = true
lockfile = false
not_found_auto_install = false
paranoid = true
plugin_autoupdate_last_check_duration = "0"
go_skip_checksum = true

[settings.python]
compile = false
uv_venv_auto = true
